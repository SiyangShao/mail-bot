{% extends "base.html" %}
{% block title %}登录 · mail-bot 看板{% endblock %}
{% block content %}
<div class="login-box">
  <h1>登录</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <input type="password" name="password" placeholder="访问密码" autofocus required>
    <button type="submit">进入看板</button>
  </form>
</div>
{% endblock %}
